name: Bump Version on PR Merge

on:
  pull_request:
    types:
      - closed
    branches:
      - main # Cambia a 'master' si es tu rama principal

jobs:
  bump-version:
    # Solo se ejecuta si la PR fue mergeada (no solo cerrada)
    if: github.event.pull_request.merged == true

    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write # Necesario para hacer push del commit con la nueva versión

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Detect bump type from PR title/body
        id: detect-bump
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_BODY="${{ github.event.pull_request.body }}"
          FULL_TEXT="$PR_TITLE $PR_BODY"

          echo "Analizando: $FULL_TEXT"

          if echo "$FULL_TEXT" | grep -qi '\[major\]'; then
            echo "bump_type=major" >> $GITHUB_OUTPUT
            echo "✅ Tipo detectado: MAJOR"
          elif echo "$FULL_TEXT" | grep -qi '\[minor\]'; then
            echo "bump_type=minor" >> $GITHUB_OUTPUT
            echo "✅ Tipo detectado: MINOR"
          elif echo "$FULL_TEXT" | grep -qi '\[patch\]'; then
            echo "bump_type=patch" >> $GITHUB_OUTPUT
            echo "✅ Tipo detectado: PATCH"
          else
            echo "bump_type=none" >> $GITHUB_OUTPUT
            echo "⚠️  No se encontró etiqueta de versión ([major], [minor], [patch]). Se omite el bump."
          fi

      - name: Bump version in package.json
        if: steps.detect-bump.outputs.bump_type != 'none'
        env:
          BUMP_TYPE: ${{ steps.detect-bump.outputs.bump_type }}
        run: |
          node --input-type=module << 'EOF'
          import { readFileSync, writeFileSync } from 'fs';
          const pkg = JSON.parse(readFileSync('package.json', 'utf8'));
          let [major, minor, patch] = pkg.version.split('.').map(Number);
          const type = process.env.BUMP_TYPE;
          if (type === 'major') { major++; minor = 0; patch = 0; }
          else if (type === 'minor') { minor++; patch = 0; }
          else if (type === 'patch') { patch++; }
          pkg.version = `${major}.${minor}.${patch}`;
          writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          console.log(`✅ Nueva versión: ${pkg.version}`);
          EOF

      - name: Configure Git identity
        if: steps.detect-bump.outputs.bump_type != 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push new version
        if: steps.detect-bump.outputs.bump_type != 'none'
        run: |
          NEW_VERSION=$(node -e "import('./package.json', {with:{type:'json'}}).then(m=>process.stdout.write(m.default.version))")
          git add package.json
          git commit -m "chore: bump version to v$NEW_VERSION [skip ci]"
          git tag "v$NEW_VERSION"
          git push origin HEAD
          git push origin "v$NEW_VERSION"
          echo "🚀 Nueva versión publicada: v$NEW_VERSION"