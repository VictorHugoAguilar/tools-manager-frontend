name: Bump Version on PR Merge

on:
  pull_request:
    types:
      - closed
    branches:
      - main # Cambia a 'master' si es tu rama principal

jobs:
  bump-version:
    # Solo se ejecuta si la PR fue mergeada (no solo cerrada)
    if: github.event.pull_request.merged == true

    runs-on: ubuntu-latest

    permissions:
      contents: write # Necesario para hacer push del commit con la nueva versión

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detect bump type from commit messages
        id: detect-bump
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          MERGE_COMMIT="${{ github.event.pull_request.merge_commit_sha }}"

          # Busca en el título y cuerpo de la PR, y en los commits que la componen
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_BODY="${{ github.event.pull_request.body }}"

          # Concatena todo el texto para buscar la etiqueta
          FULL_TEXT="$PR_TITLE $PR_BODY"

          echo "Analizando: $FULL_TEXT"

          if echo "$FULL_TEXT" | grep -qi '\[major\]'; then
            echo "bump_type=major" >> $GITHUB_OUTPUT
            echo "✅ Tipo detectado: MAJOR"
          elif echo "$FULL_TEXT" | grep -qi '\[minor\]'; then
            echo "bump_type=minor" >> $GITHUB_OUTPUT
            echo "✅ Tipo detectado: MINOR"
          elif echo "$FULL_TEXT" | grep -qi '\[patch\]'; then
            echo "bump_type=patch" >> $GITHUB_OUTPUT
            echo "✅ Tipo detectado: PATCH"
          else
            echo "bump_type=none" >> $GITHUB_OUTPUT
            echo "⚠️  No se encontró etiqueta de versión ([major], [minor], [patch]). Se omite el bump."
          fi

      - name: Bump version in package.json
        if: steps.detect-bump.outputs.bump_type != 'none'
        run: |
          node scripts/bump-version.js ${{ steps.detect-bump.outputs.bump_type }}

      - name: Configure Git identity
        if: steps.detect-bump.outputs.bump_type != 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push new version
        if: steps.detect-bump.outputs.bump_type != 'none'
        run: |
          NEW_VERSION=$(node -p "require('./package.json').version")
          git add package.json
          git commit -m "chore: bump version to v$NEW_VERSION [skip ci]"
          git tag "v$NEW_VERSION"
          git push origin HEAD
          git push origin "v$NEW_VERSION"
          echo "🚀 Nueva versión publicada: v$NEW_VERSION"
