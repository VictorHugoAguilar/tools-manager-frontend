@if (confirmService.state().visible) {
  <div class="confirm-backdrop" (click)="confirmService.resolve(false)"></div>

  <section class="confirm-panel" role="dialog" aria-modal="true" aria-label="Confirmacion">
    <p class="eyebrow">{{ confirmService.state().tone === 'danger' ? 'Accion sensible' : 'Confirmacion' }}</p>
    <h3>{{ confirmService.state().title }}</h3>
    <p class="message">{{ confirmService.state().message }}</p>

    <div class="actions">
      <button type="button" class="secondary" (click)="confirmService.resolve(false)">
        {{ confirmService.state().cancelLabel }}
      </button>
      <button
        type="button"
        class="primary"
        [class.danger]="confirmService.state().tone === 'danger'"
        (click)="confirmService.resolve(true)"
      >
        {{ confirmService.state().confirmLabel }}
      </button>
    </div>
  </section>
}
